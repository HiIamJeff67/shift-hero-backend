services:
  go-start-monolithic-kit-redis:
    container_name: ${DOCKER_REDIS_SERVICE_NAME}
    # restart: always
    image: redis:7.2.3-alpine
    volumes:
      - redis-data:/data
    command: ["redis-server", "--appendonly", "yes"]

  go-start-monolithic-kit-db:
    # should be the same as DB_HOST(hosting service)
    container_name: ${DOCKER_DB_SERVICE_NAME}
    # restart: always
    image: postgres:16
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5

  go-start-monolithic-kit-api:
    container_name: ${DOCKER_API_SERVICE_NAME}
    image: ${DOCKER_API_SERVICE_NAME}:latest
    # restart: always
    build:
      context: .
      dockerfile: infra/docker/Dockerfile.prod
    # entrypoint: ["${ENTRYPOINT_CMD}"]
    environment:
      DB_HOST: ${DB_HOST}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_NAME: ${DB_NAME}
      DB_PORT: ${DOCKER_DB_PORT}
      GIN_DOMAIN: ${GIN_DOMAIN}
      GIN_PORT: ${GIN_PORT}
      GIN_TRUSTED_PROXIES: ${GIN_TRUSTED_PROXIES}
      JWT_ACCESS_TOKEN_SECRET_KEY: ${JWT_ACCESS_TOKEN_SECRET_KEY}
      JWT_REFRESH_TOKEN_SECRET_KEY: ${JWT_REFRESH_TOKEN_SECRET_KEY}
      SMTP_HOST: ${SMTP_HOST}
      SMTP_PORT: ${SMTP_PORT}
      APP_OFFICIAL_NAME: ${APP_OFFICIAL_NAME}
      APP_OFFICIAL_GMAIL: ${APP_OFFICIAL_GMAIL}
      APP_OFFICIAL_GOOGLE_PASSWORD: ${APP_OFFICIAL_GOOGLE_PASSWORD}
      APP_OFFICIAL_GOOGLE_APPLICATION_PASSWORD: ${APP_OFFICIAL_GOOGLE_APPLICATION_PASSWORD}
      ALLOWED_DOMAINS: ${ALLOWED_DOMAINS}
      OAUTH_GOOGLE_CLIENT_ID: ${OAUTH_GOOGLE_CLIENT_ID}
      OAUTH_GOOGLE_CLIENT_SECRET: ${OAUTH_GOOGLE_CLIENT_SECRET}
      OAUTH_GOOGLE_REDIRECT_URL: ${OAUTH_GOOGLE_REDIRECT_URL}
    ports:
      - "${GIN_PORT}:${DOCKER_GIN_PORT}"
    depends_on:
      go-start-monolithic-kit-db:
        condition: service_healthy

  go-start-monolithic-kit-nginx:
    image: nginx:1.27-alpine
    container_name: ${DOCKER_NGINX_SERVICE_NAME}
    depends_on:
      - ${DOCKER_API_SERVICE_NAME}
    ports:
      - "${NGINX_HTTP_PORT}:${DOCKER_NGINX_HTTP_PORT}"
      - "${NGINX_HTTPS_PORT}:${DOCKER_NGINX_HTTPS_PORT}"
    volumes:
      - ./infra/nginx/default.prod.conf:/etc/nginx/conf.d/default.conf:ro
      - ./infra/nginx/ssl:/etc/nginx/ssl:ro

volumes:
  redis-data:
    name: go-start-monolithic-kit-redis-data
  postgres-data:
    name: go-start-monolithic-kit-postgres-data
