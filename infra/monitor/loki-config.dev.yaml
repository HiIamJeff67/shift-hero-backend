auth_enabled: false

server:
  http_listen_port: ${DOCKER_LOKI_PORT}

common:
  path_prefix: /loki
  storage:
    filesystem:
      chunks_directory: /loki/chunks
      rules_directory: /loki/rules
  replication_factor: 1
  ring:
    kvstore:
      store: inmemory

limits_config:
  # Required for accepting OpenTelemetry structured metadata
  allow_structured_metadata: true
  retention_period: 168h
  max_query_series: 500
  max_query_parallelism: 2

schema_config:
  configs:
    - from: 2024-01-01
      store: tsdb
      object_store: filesystem
      schema: v13
      index:
        prefix: index_
        period: 24h

query_range:
  results_cache:
    cache:
      embedded_cache:
        enabled: true
        max_size_mb: 100
