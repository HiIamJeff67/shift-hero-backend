receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:${DOCKER_OTEL_COLLECTOR_GRPC_PORT}
      http:
        endpoint: 0.0.0.0:${DOCKER_OTEL_COLLECTOR_HTTP_PORT}

processors:
  batch:
    # Batch all signals before exporting for better throughput
    send_batch_size: 1024
    timeout: 5s

  memory_limiter:
    # Protect the Collector from running out of memory
    check_interval: 5s
    limit_mib: 512
    spike_limit_mib: 128

  resource:
    attributes:
      # Tag all telemetry with the cluster name
      - key: cluster
        value: lgtm-local
        action: upsert

  # Add resource attributes to metric labels for PromQL filtering
  transform/metrics:
    metric_statements:
      - context: datapoint
        statements:
          - set(attributes["cluster"], resource.attributes["cluster"])

exporters:
  otlphttp/tempo:
    # Send traces to Tempo via OTLP HTTP
    endpoint: http://${DOCKER_TEMPO_SERVICE_NAME}:4318

  otlphttp/loki:
    # Send logs to Loki via its OTLP endpoint
    endpoint: http://${DOCKER_LOKI_SERVICE_NAME}:3100/otlp

  prometheusremotewrite:
    # Send metrics to Mimir via Prometheus remote write
    endpoint: http://${DOCKER_MIMIR_SERVICE_NAME}:9009/api/v1/push
    resource_to_telemetry_conversion:
      enabled: true
    tls:
      insecure: true

service:
  pipelines:
    traces:
      receivers: [otlp]
      processors: [memory_limiter, resource, batch]
      exporters: [otlphttp/tempo]
    metrics:
      receivers: [otlp]
      processors: [memory_limiter, resource, transform/metrics, batch]
      exporters: [prometheusremotewrite]
    logs:
      receivers: [otlp]
      processors: [memory_limiter, resource, batch]
      exporters: [otlphttp/loki]
